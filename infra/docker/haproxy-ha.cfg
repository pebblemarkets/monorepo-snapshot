global
    maxconn 4096

defaults
    mode http
    timeout connect 5s
    timeout client 30s
    timeout server 30s

frontend pebble_front
    bind *:80
    acl is_write method POST DELETE PATCH PUT
    use_backend pebble_write if is_write
    default_backend pebble_read

backend pebble_write
    option httpchk GET /role
    http-check expect rstring ^leader$
    server api-1 api-1:3030 check inter 250ms fall 1 rise 1
    server api-2 api-2:3030 check inter 250ms fall 1 rise 1
    server api-3 api-3:3030 check inter 250ms fall 1 rise 1

backend pebble_read
    balance roundrobin
    option httpchk GET /healthz
    http-check expect status 200
    server api-1 api-1:3030 check inter 2s
    server api-2 api-2:3030 check inter 2s
    server api-3 api-3:3030 check inter 2s
