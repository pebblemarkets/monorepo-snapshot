syntax = "proto3";

package google.rpc;

import "google/protobuf/any.proto";

// The `Status` type defines a logical error model that is suitable for different
// programming environments, including REST APIs and RPC APIs.
//
// This is a trimmed-in copy of google/rpc/status.proto, vendored to allow
// compiling Daml Ledger API protos without requiring an external googleapis
// proto checkout.
message Status {
  int32 code = 1;
  string message = 2;
  repeated google.protobuf.Any details = 3;
}

